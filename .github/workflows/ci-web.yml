name: CI — Web

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/api-client/**'
      - 'package.json'
      - '.github/workflows/ci-web.yml'
  pull_request:
    paths:
      - 'apps/web/**'
      - 'packages/api-client/**'
      - 'package.json'
      - '.github/workflows/ci-web.yml'

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install deps
        run: npm ci --workspaces --include-workspace-root

      - name: Typecheck
        run: npm --workspace apps/web run typecheck

      - name: Lint
        run: npm --workspace apps/web run lint

      - name: Format check
        run: npm --workspace apps/web run format:check

      - name: Test
        run: npm --workspace apps/web run test

      - name: Build
        run: npm --workspace apps/web run build
