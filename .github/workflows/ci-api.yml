name: CI — API

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - '.github/workflows/ci-api.yml'
  pull_request:
    paths:
      - 'apps/api/**'
      - '.github/workflows/ci-api.yml'

jobs:
  lint-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: perdiz
          POSTGRES_PASSWORD: perdiz
          POSTGRES_DB: perdiz
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U perdiz"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 5s --health-retries 10

    # MinIO is started in a dedicated step (not as a service container)
    # because GHA services can't pass a command, and minio/minio's
    # entrypoint needs ``server /data`` to actually start.

    defaults:
      run:
        working-directory: apps/api

    env:
      APP_ENV: development
      DB_URL: postgresql+asyncpg://perdiz:perdiz@localhost:5432/perdiz
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET: ci-secret-not-used-for-real
      ALLOWED_ORIGINS: http://localhost:5173
      R2_ENDPOINT_URL: http://localhost:9000
      R2_ACCESS_KEY_ID: minioadmin
      R2_SECRET_ACCESS_KEY: minioadmin
      R2_BUCKET: perdiz-media
      R2_REGION: auto
      R2_PUBLIC_BASE_URL: http://localhost:9000/perdiz-media

    steps:
      - uses: actions/checkout@v4

      - name: Start MinIO
        run: |
          docker run -d --name minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio:latest server /data
          # Wait until the health endpoint responds.
          for i in {1..30}; do
            if curl -fsS http://localhost:9000/minio/health/live; then
              echo "MinIO ready"
              exit 0
            fi
            sleep 1
          done
          echo "MinIO failed to become ready"
          docker logs minio
          exit 1

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install deps
        run: ~/.local/bin/uv sync --extra dev

      - name: Ruff check
        run: ~/.local/bin/uv run ruff check .

      - name: Ruff format check
        run: ~/.local/bin/uv run ruff format --check .

      - name: Mypy
        run: ~/.local/bin/uv run mypy app

      - name: Pytest
        run: ~/.local/bin/uv run pytest
